<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Global Conflict Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      color: #ffffff;
      overflow-x: hidden;
      font-family: 'Inter', sans-serif;
    }
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
    }
    .glass-card {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  
  <div class="relative z-10 w-full min-h-screen">
    <!-- Header Section -->
    <div class="h-screen flex flex-col items-center justify-center text-center px-4">
      <h1 class="text-5xl md:text-7xl font-bold mb-6 tracking-tight bg-clip-text text-transparent bg-gradient-to-b from-white to-gray-400">Global Situations Map</h1>
      <p class="text-xl md:text-2xl text-gray-400 max-w-2xl">Scroll to navigate the galaxy and view ongoing global conflict data.</p>
      <div class="absolute bottom-10 animate-bounce">
        <svg class="w-8 h-8 text-white opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
        </svg>
      </div>
    </div>
    
    <!-- Feed Section -->
    <div id="conflict-feed" class="max-w-4xl mx-auto px-4 pb-32 space-y-32 pt-32">
      <!-- Generated internally via JS -->
    </div>
    
    <!-- Footer Section -->
    <div class="h-screen flex items-center justify-center text-center px-4 pt-32">
       <h2 class="text-4xl md:text-5xl font-bold text-gray-500">End of Data Grid</h2>
    </div>
  </div>

  <script>
    // 1. Data Definitions (Hardcoded JSON)
    // Using space-themed fictionalized data with realistic structure to represent global conflict types
    const conflictData = [
       {
        id: "C-01",
        name: "The Orion Trade Dispute",
        countries: ["Alpha Centauri Federation", "Sirius Mining Guild"],
        region: "Sector 4",
        status: "Active - High Intensity",
        description: "A major escalation in the Orion sector over the control of rare crystal deposits on the outer rims of Sirius C. Several mining outposts have been completely shut down due to recent planetary blockades.",
        casualties: "12,000+",
        date: "Last 30 days"
      },
      {
        id: "C-02",
        name: "Andromeda Border Clash",
        countries: ["Neo-Terra", "The Martian Colonies"],
        region: "Ablon Rim",
        status: "Active - Sporadic",
        description: "Tensions have broken out into skirmishes along the neutral zone. Ground forces rely heavily on automated drone swarms and disruption tactics.",
        casualties: "Est. 3,500",
        date: "Last 6 months"
      },
      {
        id: "C-03",
        name: "Cygnus Rebellion",
        countries: ["Cygnus Prime Assembly", "Splinter Faction 9"],
        region: "Cygnus System",
        status: "De-escalating",
        description: "Prolonged resistance movement leading to heavy urban fighting. Recent peace talks show a path to a potential ceasefire, though localized skirmishes continue.",
        casualties: "45,000+",
        date: "Last 2 years"
      },
      {
        id: "C-04",
        name: "Europa Resource Wars",
        countries: ["United Earth", "Jovian Consortium"],
        region: "Sol System - Jupiter",
        status: "Active - High Intensity",
        description: "Strategic combat over the sub-glacial oceans of Europa. Naval submarines and deep-sea aquatic stations have been heavily contested.",
        casualties: "8,200+",
        date: "Last 14 days"
      },
       {
        id: "C-05",
        name: "The Kuiper Skirmishes",
        countries: ["Outer Belt Alliance", "Inner Planets Coalition"],
        region: "Sol System - Kuiper Belt",
        status: "Active - Low Intensity",
        description: "Sporadic hit-and-run attacks on shipping lanes and asteroid mining operations. The vast distances make enforcement difficult.",
        casualties: "Unknown",
        date: "Ongoing"
      }
    ];

    // 2. DOM Population
    const feedContainer = document.getElementById('conflict-feed');
    conflictData.forEach((conflict, index) => {
      const card = document.createElement('div');
      card.className = "glass-card rounded-2xl p-8 md:p-12 transform transition-all duration-500 hover:scale-[1.02] border border-gray-800 conflict-card opacity-0 translate-y-10";
      
      const badgeClass = conflict.status.includes('High Intensity') 
         ? 'bg-red-900/40 text-red-300 border border-red-500/30' 
         : (conflict.status.includes('De-escalating') 
            ? 'bg-green-900/40 text-green-300 border border-green-500/30'
            : 'bg-yellow-900/40 text-yellow-300 border border-yellow-500/30');

      card.innerHTML = `
        <div class="flex flex-col md:flex-row md:justify-between items-start md:items-center mb-6 gap-4">
          <div>
            <span class="text-xs font-bold uppercase tracking-[0.2em] text-blue-400 mb-2 block">${conflict.region}</span>
            <h2 class="text-3xl md:text-4xl font-bold text-white tracking-tight">${conflict.name}</h2>
          </div>
          <div>
             <span class="inline-flex items-center px-4 py-1.5 rounded-full text-xs font-semibold tracking-wide shadow-sm ${badgeClass}">
                <span class="w-1.5 h-1.5 rounded-full bg-current mr-2 ${conflict.status.includes('De-escalating') ? '' : 'animate-pulse'}"></span>
                ${conflict.status}
             </span>
          </div>
        </div>
        <div class="space-y-6">
           <p class="text-lg text-gray-300 leading-relaxed border-l-4 border-gray-700 pl-4 py-1">${conflict.description}</p>
           
           <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-6 border-t border-gray-800/50">
              <div>
                 <span class="block text-sm text-gray-500 font-medium mb-1">Involved Parties</span>
                 <p class="font-medium text-white text-lg">${conflict.countries.join("<span class='text-gray-600 mx-2'>•</span>")}</p>
              </div>
               <div>
                 <span class="block text-sm text-gray-500 font-medium mb-1">Impact & Timeline</span>
                 <p class="font-medium text-white text-lg">
                   Casualties: <span class="text-red-400">${conflict.casualties}</span> 
                   <span class="text-gray-600 mx-2">|</span> 
                   <span class="text-gray-400">${conflict.date}</span>
                 </p>
              </div>
           </div>
        </div>
      `;
      feedContainer.appendChild(card);
    });

    // 3. Three.js Space Background Setup
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000000, 0.0008); // Add subtle fog to blend stars away

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 4000);
    camera.position.z = 0;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Cap pixel ratio for performance
    container.appendChild(renderer.domElement);

    // Particle geometry
    const particleCount = 7000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);
    const sizes = new Float32Array(particleCount);

    const baseColor1 = new THREE.Color(0xffffff); // White stars
    const baseColor2 = new THREE.Color(0x73a8ff); // Deep blue galaxy mix

    // Seed Randomness to maintain colors
    const randomSeeds = new Float32Array(particleCount);

    for (let i = 0; i < particleCount; i++) {
       // Spread stars in a giant cylindrical deep space
       const r = 800 * Math.sqrt(Math.random()) + 20; // Radius
       const theta = Math.random() * 2 * Math.PI; // Angle
       
       positions[i * 3] = r * Math.cos(theta); // x
       positions[i * 3 + 1] = r * Math.sin(theta); // y
       positions[i * 3 + 2] = (Math.random() - 0.5) * 8000; // z - very deep tunnel

       randomSeeds[i] = Math.random();
       
       // Initial colors
       const mixedColor = baseColor1.clone().lerp(baseColor2, randomSeeds[i]);
       colors[i * 3] = mixedColor.r;
       colors[i * 3 + 1] = mixedColor.g;
       colors[i * 3 + 2] = mixedColor.b;

       sizes[i] = Math.random() * 2 + 1; // Size variation
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    // Custom shader material to allow per-particle sizes
    const material = new THREE.PointsMaterial({
      size: 2,
      vertexColors: true,
      transparent: true,
      opacity: 0.9,
      sizeAttenuation: true, // Particles get smaller further away
      blending: THREE.AdditiveBlending // Glow effect
    });

    const starfield = new THREE.Points(geometry, material);
    scene.add(starfield);

    // 4. Animation Frame
    let targetCameraZ = 0;
    let cameraZ = 0;
    let baseRotationZ = 0;

    function animate() {
      requestAnimationFrame(animate);
      
      // Smooth camera interpolation for Z depth mapping
      cameraZ += (targetCameraZ - cameraZ) * 0.08;
      camera.position.z = cameraZ;
      
      // Infinite slow galaxy rotation
      baseRotationZ += 0.0003;
      starfield.rotation.z = baseRotationZ;
      starfield.rotation.x = Math.sin(Date.now() * 0.0001) * 0.05; // Slight wobble

      renderer.render(scene, camera);
    }
    animate();

    // 5. GSAP ScrollTrigger
    gsap.registerPlugin(ScrollTrigger);

    // Animate DOM Cards
    gsap.utils.toArray('.conflict-card').forEach((card) => {
      gsap.to(card, {
        scrollTrigger: {
          trigger: card,
          start: "top 85%", // Fade in when card top hits 85% of screen
          end: "top 20%",
          scrub: false,
          toggleActions: "play reverse play reverse"
        },
        opacity: 1,
        y: 0,
        duration: 0.8,
        ease: "power2.out"
      });
    });

    // Space depth map & "New Galaxy" transition
    gsap.to(camera.position, {
       scrollTrigger: {
         trigger: document.body,
         start: "top top",
         end: "bottom bottom",
         scrub: 1.5, // 1.5s smoothing effect
         onUpdate: (self) => {
           // Move deeply into the starfield
           targetCameraZ = -self.progress * 6000;
           
           // Color Transition logic midway through the page
           const colorsAttribute = starfield.geometry.attributes.color;
           if (self.progress > 0.4) {
             // Calculate how far into the transition we are
             // Shift from 0.4 -> 0.8 to complete the fade
             const p = Math.min(Math.max((self.progress - 0.4) / 0.4, 0), 1);
             
             // "New Galaxy" colors (Deep Red/Magenta shift)
             const newColor1 = new THREE.Color(0xff2a45); // Red/Pink
             const newColor2 = new THREE.Color(0x8a2be2); // BlueViolet
             
             for (let i = 0; i < particleCount; i++) {
                // Original blue/white
                const origMixed = baseColor1.clone().lerp(baseColor2, randomSeeds[i]);
                // Target red/purple
                const newMixed = newColor1.clone().lerp(newColor2, randomSeeds[i]);
                
                // Lerp between the two galaxies based on scroll progress
                const finalColor = origMixed.clone().lerp(newMixed, p);
                
                colorsAttribute.setXYZ(i, finalColor.r, finalColor.g, finalColor.b);
             }
             colorsAttribute.needsUpdate = true;
           } else {
             // Reset to original if scrolled back up
             for (let i = 0; i < particleCount; i++) {
                const mixedColor = baseColor1.clone().lerp(baseColor2, randomSeeds[i]);
                colorsAttribute.setXYZ(i, mixedColor.r, mixedColor.g, mixedColor.b);
             }
             colorsAttribute.needsUpdate = true;
           }
         }
       }
    });

    // Window Resize Handler
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

  </script>
</body>
</html>
